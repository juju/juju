# Primary workshop workspace for Juju development with LXD cloud substrate.
# Provides Go, dqlite, LXD cloud integration, and development tooling.
# The juju SDK is listed last so all build deps are ready before compiling.
name: dev-lxd
base: ubuntu@24.04
sdks:
  - name: go
    channel: 1.26/stable
  - name: project-toolchain
  - name: project-dqlite
  - name: project-lxd-cloud
  - name: project-juju
  - name: opencode
  - name: direnvrc

actions:
  # Launch opencode within a direnv-managed environment.
  opencode: |
    direnv exec /project opencode "$@"
  # Run the project test suite with optional arguments.
  test: |
    make run-tests TEST_ARGS="$*"
  # Build the juju CLI binary.
  build-juju: |
    make juju
  # Build the jujud-controller binary (includes domain services, dqlite).
  build-controller: |
    make jujud-controller
