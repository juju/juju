name: lxd-profile-alt
summary: start a juju machine with a lxd profile
description: Run an Ubuntu system, with the given lxd-profile
type: "charm"
base: ubuntu@24.04
platforms:
  amd64:
  arm64:
  s390x:
parts:
  # Include extra files in the packed charm
  include:
    plugin: dump
    source: .
    prime:
      - README
      - config.yaml
      - hooks
      - icon.svg
      - lxd-profile.yaml
      - metadata.yaml
