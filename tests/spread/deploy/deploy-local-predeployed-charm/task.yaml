summary: Deploy a local charm then deploy from pre-deployed archive

execute: |
    . "$TESTSLIB/spread-env.sh"
    . "$TESTSLIB/charmcraft.sh"

    model_name="test-deploy-local-predeployed-charm"
    ensure "${model_name}" "${TEST_DIR}/${model_name}.log"

    # shellcheck disable=SC2046
    juju deploy $(pack_charm "$SPREAD_PATH/testcharms/charms/ubuntu-plus") --base ubuntu@24.04
    wait_for "ubuntu-plus" "$(idle_condition "ubuntu-plus")"

    juju deploy local:ubuntu-plus-0 another-ubuntu-plus-app
    wait_for "another-ubuntu-plus-app" "$(idle_condition "another-ubuntu-plus-app")"
    wait_for "active" '.applications["another-ubuntu-plus-app"] | ."application-status".current'

restore: |
    . "$TESTSLIB/spread-env.sh"
    destroy_model "test-deploy-local-predeployed-charm" || true
