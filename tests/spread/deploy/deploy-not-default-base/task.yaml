summary: Deploy a charm with explicit base overriding model default-base

execute: |
    . "$TESTSLIB/spread-env.sh"

    model_name="test-deploy-not-default-base"
    ensure "${model_name}" "${TEST_DIR}/${model_name}.log"

    juju model-config default-base=ubuntu@24.04
    juju deploy ubuntu --storage "files=tmpfs" --base ubuntu@24.04
    wait_for "ubuntu" "$(idle_condition "ubuntu")"

    ubuntu_base_name=$(juju status --format=json | yq ".applications.ubuntu.base.name")
    ubuntu_base_ch=$(juju status --format=json | yq ".applications.ubuntu.base.channel")
    echo "$ubuntu_base_name" | check "ubuntu"
    echo "$ubuntu_base_ch" | check "24.04"

restore: |
    . "$TESTSLIB/spread-env.sh"
    destroy_model "test-deploy-not-default-base" || true
