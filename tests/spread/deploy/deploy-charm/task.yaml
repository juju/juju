summary: Deploy a charm from the store

execute: |
    . "$TESTSLIB/spread-env.sh"

    ensure "test-deploy-charm" "${TEST_DIR}/test-deploy-charm.log"

    juju deploy ubuntu-lite
    wait_for "ubuntu-lite" "$(idle_condition "ubuntu-lite")"

restore: |
    . "$TESTSLIB/spread-env.sh"
    destroy_model "test-deploy-charm" || true
