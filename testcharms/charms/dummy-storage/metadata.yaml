categories:
  - misc
series:
  - jammy
  - focal
  - bionic

storage:
  single-fs:
    type: filesystem
    description: Single instance storage of filesystem type.
    minimum-size: 10M
    location: /srv/single-fs
    multiple:
      range: 0-1
  multi-fs:
    type: filesystem
    description: Multiple storage instances of filesystem type.
    minimum-size: 10M
    location: /srv/multi-fs
    multiple:
      range: 0-2
  single-blk:
    type: block
    description: Single instance storage of block type.
    minimum-size: 10M
    multiple:
      range: 0-1
  multi-blk:
    type: block
    description: Multiple storage instances of block type.
    minimum-size: 10M
    multiple:
      range: 0-2
