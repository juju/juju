name: "Docs"

on:
  workflow_dispatch:
  workflow_call:

jobs:
  docs:
    name: Check Autogenerated Documentation
    runs-on:
      - linux
      - self-hosted
      - x64
      - xlarge
      - ${{ (github.repository_owner == 'juju' && 'aws') || (github.repository_owner == 'canonical' && 'noble') }}
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Squid"
        if: github.repository_owner != 'juju'
        run: ./.github/squid.sh

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: true

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.10"

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20

      - name: Install Excalidraw CLI dependencies
        run: |
          # Note: The playwright installation is a little heavy, so it might take some time. But it is necessary for the
          #       excalidraw-brute-export-cli to work. This the only way to export excalidraw files to SVG, saving the fonts and
          #       other assets in the SVG file, all other tools do not provide this feature.
          npx playwright install
          npx playwright install-deps

      - name: Install sphinx dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          python -m pip install --upgrade --no-cache-dir pip setuptools
          python -m pip install --exists-action=w --no-cache-dir -r docs/requirements.txt

      - name: Make documentation
        run: |
          make docs-html

      - name: Check for changes
        run: |
          git add -A
          git rm -rf --quiet --cached venv/
          if [[ -n $(git diff HEAD) ]]; then
            # Print the full diff for debugging purposes
            git diff HEAD
            echo "*****"
            echo "The following generated documentation has been modified:"
            git diff --name-status HEAD
            echo ""
            echo "Please regenerate these files using make docs-html and check in the changes."
            echo "*****"
            exit 1
          fi
