name: "Snapcraft"
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  snap:
    name: Build linux-arm64
    runs-on:
      - self-hosted
      - linux
      - arm64
      - ${{ (github.repository_owner == 'juju' && 'aws') || (github.repository_owner == 'canonical' && 'noble') }}
      - ${{ (github.repository_owner == 'juju' && 'quad-xlarge') || (github.repository_owner == 'canonical' && 'xlarge') }}

    steps:
      - name: Install Dependencies
        shell: bash
        run: |
          set -euxo pipefail
          action=$(snap info snapcraft | grep -q "installed" || echo "install")
          if [ "$action" == "" ]; then
              action="refresh"
          fi
          sudo snap $action snapcraft --channel 9.x --classic
          echo "/snap/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Squid"
        if: github.repository_owner != 'juju'
        run: ./.github/squid.sh

      - name: Setup LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1

      - name: Wait for LXD
        run: |
          while ! ip link show lxdbr0; do
            echo "Waiting for lxdbr0..."
            sleep 10
          done

      - name: Set up Go
        if: env.RUN_TEST == 'RUN'
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: Build snap
        shell: bash
        run: |
          set -euxo pipefail
          snapcraft --use-lxd

      - name: Install snap
        shell: bash
        run: |
          set -euxo pipefail
          sudo snap install *.snap --dangerous
          # Since we're installing dangerously, we need to
          # manually grant permissions to juju
          sudo snap connect juju:lxd lxd
          sudo snap connect juju:config-lxd
          sudo snap connect juju:dot-local-share-juju
          sudo snap connect juju:ssh-keys
          snap connections juju

      - name: Test bootstrap
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          juju bootstrap --model-default enable-os-upgrade=false localhost --debug
