name: "Snapcraft"
on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

jobs:
  snap:
    name: Build linux-arm64
    runs-on:
      - self-hosted
      - linux
      - arm64
      - ${{ (github.repository_owner == 'juju' && 'aws') || (github.repository_owner == 'canonical' && 'noble') }}
      - ${{ (github.repository_owner == 'juju' && 'quad-xlarge') || (github.repository_owner == 'canonical' && 'xlarge') }}

    steps:
      - name: Install Dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo snap install snapcraft --classic
          echo "/snap/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: "Squid"
        if: github.repository_owner != 'juju'
        run: ./.github/squid.sh

      - name: Setup LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1

      - name: Wait for LXD
        run: |
          timeout=600
          start=$SECONDS
          while ! ip link show lxdbr0; do
            if (( SECONDS - start > timeout )); then
              echo "Timed out waiting for lxdbr0 after ${timeout}s"
              exit 1
            fi
            echo "Waiting for lxdbr0..."
            sleep 10
          done

      - name: Build snap
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf snap
          mkdir -p snap
          cp -a snaps/juju/. snap/
          snapcraft --use-lxd

      - name: Install snap
        shell: bash
        run: |
          set -euxo pipefail
          sudo snap install *.snap --dangerous
          # Since we're installing dangerously, we need to
          # manually grant permissions to juju
          sudo snap connect juju:lxd lxd
          sudo snap connect juju:config-lxd
          sudo snap connect juju:dot-local-share-juju
          sudo snap connect juju:ssh-keys
          snap connections juju

      - name: Test bootstrap
        shell: bash
        run: |
          set -euxo pipefail
          mkdir -p ~/.ssh
          juju bootstrap --model-default enable-os-upgrade=false localhost --debug

  jujud-snap:
    name: Build jujud snap
    runs-on:
      - self-hosted
      - linux
      - arm64
      - ${{ (github.repository_owner == 'juju' && 'aws') || (github.repository_owner == 'canonical' && 'noble') }}
      - ${{ (github.repository_owner == 'juju' && 'quad-xlarge') || (github.repository_owner == 'canonical' && 'xlarge') }}

    steps:
      - name: Install Dependencies
        shell: bash
        run: |
          set -euxo pipefail
          sudo snap install snapcraft --classic
          echo "/snap/bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Squid"
        if: github.repository_owner != 'juju'
        run: ./.github/squid.sh

      - name: Setup LXD
        uses: canonical/setup-lxd@8c6a87bfb56aa48f3fb9b830baa18562d8bfd4ee # v1

      - name: Wait for LXD
        run: |
          timeout=600
          start=$SECONDS
          while ! ip link show lxdbr0; do
            if (( SECONDS - start > timeout )); then
              echo "Timed out waiting for lxdbr0 after ${timeout}s"
              exit 1
            fi
            echo "Waiting for lxdbr0..."
            sleep 10
          done

      - name: Build jujud snap
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf snap
          mkdir -p snap
          cp -a snaps/jujud/. snap/
          snapcraft --use-lxd

      - name: Verify snap artifact
        shell: bash
        run: |
          set -euxo pipefail
          ls -la jujud_*.snap
          sudo snap install jujud_*.snap --dangerous
          snap services jujud
          sudo snap remove jujud
