name: "Generate"
on:
  workflow_dispatch:
  workflow_call:

jobs:
  generate:
    name: Check Generated Mocks
    runs-on:
      - self-hosted
      - linux
      - arm64
      - ${{ (github.repository_owner == 'juju' && 'aws') || (github.repository_owner == 'canonical' && 'noble') }}
      - ${{ (github.repository_owner == 'juju' && 'xxlarge') || (github.repository_owner == 'canonical' && 'xlarge') }}

    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: "Squid"
        if: github.repository_owner != 'juju'
        run: ./.github/squid.sh

      - name: "Set up Go"
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: "go.mod"
          cache: false

      - name: "Regenerate code"
        shell: bash
        run: |
          # Running go generate by itself is slow over a large codebase, where
          # all generate directives are dispersed over many files. Instead, the
          # following locates the directives before piping them to go generate
          # in parallel.
          #
          #  1. Use git grep to list the go files containing a go generate
          #     directive (-l prints each matching file once).
          #  2. Using xargs perform go generate in parallel.
          #
          # Note: git grep is used rather than `git ls-files | xargs grep`
          # because the latter batches files across multiple grep invocations,
          # and any batch with no match makes grep exit 1, which under
          # `set -o pipefail` fails the whole step (exit 123) even though every
          # go generate succeeded.
          git grep -l -e '//go:generate' -- '*.go' | xargs -n 1 -P 8 -I% sh -c 'go generate -x "$(realpath %)" || (echo FAIL: % && exit 1)'

      - name: "Check diff"
        shell: bash
        run: |
          git add -A
          if [[ -n $(git diff HEAD) ]]; then
            # Print the full diff for debugging purposes
            git diff HEAD
            echo "*****"
            echo "The following generated files have been modified:"
            git diff --name-status HEAD
            echo "Please regenerate these files and check in the changes."
            echo "*****"
            exit 1
          fi
