name: Send Mattermost notification
description: Send a message to a Mattermost channel via incoming webhook

inputs:
  webhook_url:
    description: Mattermost incoming webhook URL
    required: true
  message:
    description: Message to post
    required: true

runs:
  using: composite
  steps:
    - shell: bash
      env:
        WEBHOOK_URL: ${{ inputs.webhook_url }}
        MESSAGE: ${{ inputs.message }}
      run: |
        jq -n --arg text "$MESSAGE" '{text: $text}' | \
          curl -s -o /dev/null -w '%{http_code}' \
            -H 'Content-Type: application/json' \
            -d @- \
            "$WEBHOOK_URL"
